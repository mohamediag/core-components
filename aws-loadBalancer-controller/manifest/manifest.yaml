    helm.sh/chart: aws-load-balancer-controller-1.9.0
    prometheus.io/service-monitor: "false"
  name: aws-load-balancer-webhook-service
  namespace: aws-load-balancer-controller
spec:
  ports:
  - name: webhook-server
